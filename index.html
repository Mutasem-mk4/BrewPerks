<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#F9F8F6" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="Exclusive coffee shop discounts and discovery platform in Jordan.">
    
    <title>BrewPerks - Cafe Rewards</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="./manifest.json" />
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/751/751621.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Outfit', 'Cairo', 'sans-serif'],
              serif: ['Playfair Display', 'serif'],
            },
            colors: {
              coffee: {
                25: '#FDFCFB',  /* Ultra Light base */
                50: '#F9F8F6',  /* Soft Cream */
                100: '#F0EBE5', /* Very Light Beige */
                200: '#E0D6C8', /* Sand */
                300: '#C8B8A0', /* Latte */
                400: '#A8967D',
                500: '#8C7B65', /* Muted Earth */
                600: '#6E5D4B',
                700: '#54473A',
                800: '#3D332A',
                900: '#2A231D', /* Softer Charcoal */
                950: '#1C1612',
              },
            },
            boxShadow: {
              'soft': '0 10px 40px -10px rgba(140, 123, 101, 0.08)',
              'comfort': '0 25px 50px -12px rgba(61, 51, 42, 0.08)',
              'glass': '0 8px 32px 0 rgba(31, 38, 135, 0.03)',
            },
            borderRadius: {
              '3xl': '1.5rem',
              '4xl': '2rem',
            }
          }
        }
      }
    </script>
    <style>
      body {
        font-family: 'Outfit', sans-serif;
        background-color: #F9F8F6;
        color: #3D332A;
        overscroll-behavior-y: none;
        -webkit-tap-highlight-color: transparent;
        transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1), color 0.4s ease;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        line-height: 1.6;
      }
      /* Dark mode body override */
      .dark body {
        background-color: #1C1612; /* coffee-950 */
        color: #F0EBE5; /* coffee-100 */
      }
      
      /* Arabic Font Override */
      body[dir="rtl"] {
        font-family: 'Cairo', sans-serif !important;
      }
      body[dir="rtl"] .font-serif {
        font-family: 'Cairo', sans-serif !important;
      }
      
      .font-serif {
        font-family: 'Playfair Display', serif;
      }
      .scrollbar-hide::-webkit-scrollbar {
          display: none;
      }
      .scrollbar-hide {
          -ms-overflow-style: none;
          scrollbar-width: none;
      }
      .glass-panel {
        background: rgba(255, 255, 255, 0.75);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.4);
      }
      .dark .glass-panel {
        background: rgba(42, 35, 29, 0.7); /* coffee-900 with opacity */
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
      /* Safe area spacing for notched phones */
      .pb-safe {
        padding-bottom: env(safe-area-inset-bottom);
      }
      .pt-safe {
        padding-top: env(safe-area-inset-top);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.1",
    "react-dom/": "https://esm.sh/react-dom@^19.2.1/",
    "react/": "https://esm.sh/react@^19.2.1/",
    "@google/genai": "https://esm.sh/@google/genai@^1.33.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.560.0"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(registration => {
              console.log('SW registered: ', registration);
            })
            .catch(registrationError => {
              console.log('SW registration failed: ', registrationError);
            });
        });
      }
    </script>
  </body>
</html>
